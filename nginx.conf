        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = aplusbinary.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name aplusbinary.com www.aplusbinary.com;
    return 404; # managed by Certbot
